<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label, input, button {
            display: block;
            margin: 10px 0;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Age Eligibility Checker</h1>
    <label for="ageInput">Enter your age:</label>
    <input type="number" id="ageInput" min="0" max="120">
    <button id="checkButton">Check Eligibility</button>
    <p id="result">Results:</p>

    <script src="script.js"></script>
</body>
</html>
